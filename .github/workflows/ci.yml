name: CI

on: 
  pull_request:
     branches: [ main ]
  push: 
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Run tests with report
        run: |
          mkdir -p results
          npm test | tee results/test-report.txt
          echo "commit": ${{ github.sha }} > results/test-report.txt
          echo "run:" ${{ github.run_id }} >> results/test-report.txt
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-results -${{ github.sha }}
          path: results/

  security-analysis:
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      security-events: write
      actions: read
    steps: 
      - uses: actions/checkout@v4
      - name: Initialize analysis
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
      - name: Analyze
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/analyze@v4
        with:
          upload: never